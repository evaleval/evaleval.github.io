<!-- Hero Section -->
<section id="home" class="min-h-screen px-8 pt-20 flex items-center justify-center relative" style="background-color: var(--bg-warm);">

    <div class="max-w-4xl w-full mx-auto flex flex-col justify-center">

        <!-- Banner Image -->
        <img src="assets/img/site-banner.png" alt="EvalEval Coalition" class="site-banner-img w-full object-cover mb-10" />

        <div class="mb-8">
            <span class="mono text-xs tracking-widest uppercase" style="color: var(--fg-subtle);">Research Community</span>
            <h1 class="hero-title font-bold my-4" style="color: var(--fg);">
                EvalEval <span style="border-bottom: 2.5px solid var(--fg);">Coalition</span>
            </h1>
            <p class="text-xl max-w-xl leading-relaxed" style="color: var(--fg-muted);">
                We are a research community developing scientifically grounded <strong style="color: var(--fg); font-weight: 600;">research outputs</strong> and robust <strong style="color: var(--fg); font-weight: 600;">deployment infrastructure</strong> for <strong style="color: var(--fg); font-weight: 600;">broader impact evaluations</strong>.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mt-2">
            <a href="#research" class="px-6 py-3 font-semibold text-sm mono inline-flex items-center justify-center transition-all duration-200" style="background-color: var(--fg); color: var(--bg); border: 1.5px solid var(--fg);"
               onmouseover="this.style.backgroundColor='var(--accent)'; this.style.borderColor='var(--accent)';"
               onmouseout="this.style.backgroundColor='var(--fg)'; this.style.borderColor='var(--fg)';">
                Explore Research
            </a>
            <a href="#contact" class="px-6 py-3 font-semibold text-sm mono inline-flex items-center justify-center transition-all duration-200" style="background-color: transparent; color: var(--fg); border: 1.5px solid var(--border-strong);"
               onmouseover="this.style.backgroundColor='var(--bg-surface)';"
               onmouseout="this.style.backgroundColor='transparent';">
                Join Our Community
            </a>
        </div>

    </div>

    <!-- Scroll Indicator -->
    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce hidden md:block" style="color: var(--fg-subtle);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
    </div>
</section>
