<script>
// ===== DARK MODE =====
(function() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
})();

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', function () {
    // Attach theme toggle listeners
    ['theme-toggle', 'theme-toggle-mobile'].forEach(function(id) {
        const btn = document.getElementById(id);
        if (btn) btn.addEventListener('click', toggleTheme);
    });

    // Smooth scrolling
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    // Hamburger menu toggle (body scroll lock + a11y — overlay is viewport-fixed only if no backdrop-filter ancestor)
    const toggleBtn = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    const closeBtn = document.getElementById('menu-close');

    function setMobileMenuOpen(open) {
        if (!mobileMenu) return;
        mobileMenu.classList.toggle('hidden', !open);
        document.body.style.overflow = open ? 'hidden' : '';
        if (toggleBtn) toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    if (toggleBtn && mobileMenu) {
        toggleBtn.addEventListener('click', function () {
            setMobileMenuOpen(mobileMenu.classList.contains('hidden'));
        });
    }

    if (closeBtn && mobileMenu) {
        closeBtn.addEventListener('click', function () {
            setMobileMenuOpen(false);
        });
    }

    if (mobileMenu) {
        mobileMenu.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
                setMobileMenuOpen(false);
            });
        });
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && mobileMenu && !mobileMenu.classList.contains('hidden')) {
            setMobileMenuOpen(false);
        }
    });

    // MathJax typeset (if used)
    if (typeof MathJax !== 'undefined') {
        MathJax.typesetPromise();
    }

    // Move footnotes to sidebar if needed
    const footnotes = document.querySelectorAll('.footnote-item');
    const footnoteContainer = document.getElementById('dynamic-footnotes');
    if (footnoteContainer && footnotes.length > 0) {
        footnotes.forEach(fn => {
            const clone = fn.cloneNode(true);
            footnoteContainer.appendChild(clone);
        });
    }
});
</script>
