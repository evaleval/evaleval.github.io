<!-- Contact Section -->
<section id="contact" class="py-24 px-8" style="background-color: var(--bg-warm);">
  <div class="max-w-4xl mx-auto">

    <div class="mb-12">
      <span class="mono text-xs tracking-widest uppercase mb-4 block" style="color: var(--fg-subtle);">Get Involved</span>
      <h2 class="text-3xl md:text-4xl font-bold mb-5 tracking-tight" style="color: var(--fg);">Join Our Community</h2>
      <p class="text-lg max-w-xl leading-relaxed mb-8" style="color: var(--fg-muted);">
        Researchers, practitioners, and students are welcome to contribute to our mission.
        Send us an email to learn more about getting involved.
      </p>
      <a href="mailto:join@evalevalai.com"
         class="inline-flex items-center gap-2 px-6 py-3 font-semibold text-sm mono transition-all duration-200"

         onmouseover="this.style.backgroundColor='var(--accent)'; this.style.borderColor='var(--accent)';"
         onmouseout="this.style.backgroundColor='var(--fg)'; this.style.borderColor='var(--fg)';">
         <i class="fa-regular fa-envelope"></i>
         join@evalevalai.com
      </a>
    </div>

    <!-- Divider -->
    <div style="height: 1px; background-color: var(--border);" class="mb-12"></div>

    <!-- Hosted By -->

      <p class="mono text-xs tracking-widest uppercase mb-8" style="color: var(--fg-subtle);">Hosted By</p>
      <div class="flex flex-wrap items-center gap-10 md:gap-16">
        <a href="https://huggingface.co" target="_blank" class="host-logo-link transition-all duration-300" style="opacity: 0.5;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">
          <img src="https://huggingface.co/datasets/huggingface/brand-assets/resolve/main/hf-logo-with-title.svg?download=true" alt="Hugging Face" class="host-logo h-10 md:h-12 w-auto">
        </a>
        <a href="https://www.ed.ac.uk/" target="_blank" class="host-logo-link transition-all duration-300" style="opacity: 0.5;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">

        </a>
        <a href="https://www.eleuther.ai/" target="_blank" class="host-logo-link transition-all duration-300" style="opacity: 0.5;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">
          <img src="https://i0.wp.com/opensource.org/wp-content/uploads/2023/06/eleutherai.png?quality=80&ssl=1" alt="EleutherAI" class="host-logo h-10 md:h-12 w-auto">

    </div>

  </div>
