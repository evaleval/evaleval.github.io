
<head>
    {% seo %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvalEval Coalition | Research Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/3.37.1/minified.js" integrity="sha512-U4FQp6xhb4Td3Upi3FYbsjmR7dMyU7a5W6ldSm5XXdFvL9m2eLOiSvOwUM24gjRjPNCQK+v8tHnTSu8DGuTk0w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600;700&display=swap');

        /* ===== DESIGN TOKENS ===== */
        :root {
            /* Warm off-white base, inspired by high-quality academic/research sites */
            --bg: #ffffff;
            --bg-warm: #faf9f6;       /* hero, contact — slightly warm off-white */
            --bg-subtle: #f5f4f1;     /* alternate sections */
            --bg-surface: #eeece8;    /* tags, icon backgrounds */
            --fg: #1a1916;            /* near-black with warm undertone */
            --fg-muted: #5c5a55;      /* secondary text */
            --fg-subtle: #9c9a95;     /* labels, timestamps */
            --border: #e8e6e1;        /* subtle warm borders */
            --border-strong: #c8c6c0; /* more visible borders */
            --accent: #5bacd1;        /* keep original accent — it works */
            --accent-hover: #4a9bb8;
            --accent-fg: #ffffff;
            --nav-bg: rgba(255, 255, 254, 0.95);
            --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.07);
        }

        [data-theme="dark"] {
            --bg: #111110;
            --bg-warm: #141412;
            --bg-subtle: #1a1916;
            --bg-surface: #252420;
            --fg: #f0ede8;
            --fg-muted: #a09d97;
            --fg-subtle: #5c5a55;
            --border: #2e2c28;
            --border-strong: #484540;
            --accent: #7dc3e0;        /* slightly lighter for dark bg legibility */
            --accent-hover: #9dd3ec;
            --accent-fg: #111110;
            --nav-bg: rgba(17, 17, 16, 0.96);
            --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.5);
        }

        /* ===== BASE ===== */
        *, *::before, *::after {
            transition: background-color var(--transition), border-color var(--transition), color var(--transition);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            overflow-x: hidden;
        }

        html {
            scroll-padding-top: 70px;
            scroll-behavior: smooth;
        }

        /* ===== GLOBAL HEADING + BODY COLOR ===== */
        /* Ensures headings are always readable regardless of Tailwind classes */
        h1, h2, h3, h4, h5, h6 {
            color: var(--fg);
        }
        p, li, td, th, span:not(.fn-badge):not(.post-tag):not(.section-label) {
            color: inherit;
        }

        /* ===== DARK MODE TAILWIND OVERRIDES ===== */
        [data-theme="dark"] .bg-white      { background-color: var(--bg) !important; }
        [data-theme="dark"] .bg-gray-50    { background-color: var(--bg-subtle) !important; }
        [data-theme="dark"] .bg-gray-100   { background-color: var(--bg-surface) !important; }
        [data-theme="dark"] .bg-gray-200   { background-color: var(--bg-surface) !important; }
        [data-theme="dark"] .border-gray-200 { border-color: var(--border) !important; }
        [data-theme="dark"] .border-gray-100 { border-color: var(--border) !important; }
        [data-theme="dark"] .text-gray-600 { color: var(--fg-muted) !important; }
        [data-theme="dark"] .text-gray-500 { color: var(--fg-muted) !important; }
        [data-theme="dark"] .text-gray-400 { color: var(--fg-subtle) !important; }
        [data-theme="dark"] .text-black    { color: var(--fg) !important; }
        [data-theme="dark"] .text-gray-800 { color: var(--fg) !important; }
        [data-theme="dark"] .text-gray-700 { color: var(--fg-muted) !important; }
        [data-theme="dark"] .border-black  { border-color: var(--border-strong) !important; }
        [data-theme="dark"] .bg-black      { background-color: var(--fg) !important; color: var(--bg) !important; }
        [data-theme="dark"] .text-white    { color: var(--bg) !important; }
        [data-theme="dark"] .shadow-md     { box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important; }
        [data-theme="dark"] .hover\:bg-gray-100:hover { background-color: var(--bg-surface) !important; }
        [data-theme="dark"] .hover\:bg-gray-800:hover { background-color: var(--fg-muted) !important; }
        [data-theme="dark"] .hover\:shadow-lg:hover   { box-shadow: var(--shadow-card) !important; }
        [data-theme="dark"] .border-t      { border-color: var(--border) !important; }

        /* Host logos in dark mode — grayscale + invert so white backgrounds
           become dark (merging with page bg) and logo marks appear as light */
        [data-theme="dark"] .host-logo {
            filter: grayscale(1) invert(1) brightness(1.4) !important;
        }
        [data-theme="dark"] .host-logo-link {
            opacity: 0.8 !important;
        }

        /* ===== TYPOGRAPHY ===== */
        .mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
            font-weight: 700;
        }

        /* ===== NAVIGATION ===== */
        .nav-link {
            position: relative;
            color: var(--fg);
            transition: color var(--transition);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1.5px;
            bottom: -3px;
            left: 0;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        /* ===== CARDS ===== */
        .project-card, .event-card {
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
            border: 1px solid var(--border);
            background-color: var(--bg);
        }

        .project-card:hover, .event-card:hover {
            box-shadow: var(--shadow-card);
            border-color: var(--border-strong);
        }

        /* ===== BLOG CARDS ===== */
        .post-card {
            transition: all 0.25s ease;
            border: 1px solid var(--border);
            background-color: var(--bg);
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .post-card:hover {
            box-shadow: var(--shadow-card);
            border-color: var(--border-strong);
            transform: translateY(-2px);
        }

        /* ===== BLOG LAYOUT ===== */
        .blog-container {
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .blog-container {
                flex-direction: row;
            }
        }

        .blog-content {
            flex: 1;
            padding-right: 2rem;
        }

        .blog-sidebar {
            width: 300px;
            padding-left: 2rem;
            border-left: 1px solid var(--border);
        }

        /* ===== FOOTNOTES ===== */
        .footnote-ref {
            vertical-align: super;
            font-size: 0.8em;
            margin-left: 2px;
            cursor: pointer;
            color: var(--accent);
            text-decoration: none;
        }

        .footnote-item {
            margin-bottom: 1rem;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .footnote-backref {
            margin-left: 4px;
        }

        #footnote-display a,
        #footnote-content a {
            color: var(--accent);
            text-decoration: underline;
        }

        #footnote-display a:hover,
        #footnote-content a:hover {
            color: var(--accent-hover);
        }

        /* Enhanced footnote badge */
        .footnote-ref {
            background-color: var(--accent);
            color: var(--accent-fg);
            padding: 0.125rem 0.375rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            margin-left: 0.125rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .footnote-ref:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .footnote-sidebar-item {
            transition: all 0.3s ease;
            scroll-margin-top: 100px;
        }

        .footnote-sidebar-item:hover {
            background-color: var(--bg-subtle);
            border-color: var(--border-strong);
        }

        .footnote-sidebar-item.highlighted {
            background-color: color-mix(in srgb, var(--accent) 15%, transparent) !important;
            border-color: var(--accent) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* ===== POST META ===== */
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            font-size: 0.875rem;
            color: var(--fg-muted);
        }

        .post-meta a {
            color: var(--fg);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .post-meta a:hover {
            color: var(--accent);
        }

        /* ===== TAGS ===== */
        .post-tag {
            display: inline-flex;
            align-items: center;
            background-color: var(--bg-surface);
            color: var(--fg-muted);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.025em;
            transition: all 0.2s ease;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .post-tag:hover {
            background-color: var(--accent);
            color: var(--accent-fg);
        }

        /* ===== PROSE (BLOG POSTS) ===== */
        .prose {
            line-height: 1.75;
            color: var(--fg);
            max-width: none;
        }

        .prose a {
            color: var(--accent) !important;
            text-decoration: underline !important;
            transition: color 0.2s ease;
        }

        .prose a:hover {
            color: var(--accent-hover) !important;
        }

        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
            color: var(--fg);
            font-weight: 700;
        }

        .prose h2 {
            font-size: 1.875rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .prose h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        .prose h4 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .prose p {
            margin-bottom: 1.25rem;
            color: var(--fg);
        }

        .prose strong {
            color: var(--fg);
            font-weight: 600;
        }

        .prose blockquote {
            border-left: 3px solid var(--accent);
            background-color: var(--bg-subtle);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--fg-muted);
        }

        .prose blockquote p { margin-bottom: 0; }

        .prose code {
            background-color: var(--bg-surface);
            color: var(--fg);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }

        .prose pre {
            background-color: #0f0f11;
            color: #e4e4e7;
            padding: 1.25rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid var(--border);
        }

        .prose pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }

        .prose ul, .prose ol {
            margin: 1.25rem 0;
            padding-left: 1.5rem;
        }

        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose ul ul { list-style-type: circle; }
        .prose ol ol { list-style-type: lower-alpha; }

        .prose li {
            margin-bottom: 0.5rem;
            color: var(--fg);
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        .prose th, .prose td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
            color: var(--fg);
        }

        .prose th {
            background-color: var(--bg-subtle);
            font-weight: 600;
        }

        /* ===== EQUATION ===== */
        .equation {
            overflow-x: auto;
            padding: 1rem 0;
        }

        .MathJax_Display {
            margin: 1.5rem 0;
            padding: 1rem;
            background-color: var(--bg-subtle);
            border-radius: 0.5rem;
            overflow-x: auto;
        }

        /* ===== TABLE OF CONTENTS ===== */
        #toc a {
            transition: all 0.2s ease;
            color: var(--fg-subtle);
        }

        #toc a:hover {
            background-color: var(--bg-subtle);
            transform: translateX(0.25rem);
            color: var(--fg-muted);
        }

        #toc a.active {
            color: var(--accent);
            border-left-color: var(--accent);
        }

        /* ===== DARK MODE TOGGLE ===== */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--fg-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .theme-toggle .icon-moon { display: block; }
        .theme-toggle .icon-sun  { display: none; }

        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
        [data-theme="dark"] .theme-toggle .icon-sun  { display: block; }


        /* ===== ACCESSIBILITY ===== */
        .prose a:focus,
        .footnote-ref:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        ::selection {
            background-color: var(--accent);
            color: var(--accent-fg);
        }

        /* ===== UTILITIES ===== */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prose * { color: inherit; }

        /* ===== RESPONSIVE PROSE ===== */
        @media (max-width: 1024px) {
            .prose h2 { font-size: 1.5rem; }
            .prose h3 { font-size: 1.25rem; }
            .prose h4 { font-size: 1.125rem; }
        }

        /* ===== IMAGES IN DARK MODE ===== */
        /* Slightly dim photos/screenshots so they don't blast white in dark mode */
        [data-theme="dark"] img:not(.no-dark-filter):not(.host-logo):not(.logo-img) {
            filter: brightness(0.88) contrast(1.02);
        }

        /* For logos with white/opaque backgrounds — grayscale + invert so the
           white bg merges with dark page and logo marks appear as light shapes */
        [data-theme="dark"] img.logo-img {
            filter: grayscale(1) invert(1) opacity(0.75);
        }

        /* Site banner: keep colors but dim slightly */
        [data-theme="dark"] img.site-banner-img {
            filter: brightness(0.82) saturate(0.9);
        }

        /* Team/person photos: gentle dim, no invert */
        [data-theme="dark"] img.team-photo {
            filter: brightness(0.85) contrast(1.05);
        }

        /* Blog post images: gentle dim only */
        [data-theme="dark"] .post-card img,
        [data-theme="dark"] .blog-image img {
            filter: brightness(0.85);
        }

        /* ===== PRINT ===== */
        @media print {
            .sidebar { display: none; }
            .prose { max-width: none; }
            .footnote-ref {
                background-color: transparent;
                color: black;
                border: 1px solid black;
            }
        }
    </style>
</head>
